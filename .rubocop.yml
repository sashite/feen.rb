inherit_from: .rubocop_todo.yml

require:
  - rubocop-performance
  - rubocop-thread_safety

AllCops:
  Exclude:
    - test/**/*.rb

  NewCops: enable

  TargetRubyVersion: 2.7

Layout/LineLength:
  Enabled: false

Style/AsciiComments:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes
